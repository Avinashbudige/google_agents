steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/intent-bridge-agent:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/intent-bridge-agent:latest'
      - '.'

  # Step 2: Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/intent-bridge-agent:$COMMIT_SHA']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/intent-bridge-agent:latest']

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'intent-bridge-agent'
      - '--image=gcr.io/$PROJECT_ID/intent-bridge-agent:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=us-central1,API_URL=http://localhost:8000'
      - '--service-account=aiagents-491012-c053d887095c@aiagents-491012.iam.gserviceaccount.com'

images:
  - 'gcr.io/$PROJECT_ID/intent-bridge-agent:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/intent-bridge-agent:latest'
